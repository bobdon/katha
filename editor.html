<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katha — Editor</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="editor.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Noto+Sans+Bengali:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h1 class="login-logo">কথা <span>Katha</span></h1>
      <p class="login-subtitle">Editor Access</p>
      <div class="login-divider"></div>
      <p class="login-instruction">Sign in with your authorized Google account</p>
      <div id="googleSignInBtn"></div>
      <p class="login-error" id="loginError"></p>
    </div>
  </div>

  <!-- Editor (hidden until authenticated) -->
  <div class="editor-app" id="editorApp" style="display:none;">

    <!-- Editor Header -->
    <header class="editor-header">
      <div class="editor-header-left">
        <h1 class="editor-logo">কথা <span>Editor</span></h1>
      </div>
      <div class="editor-header-right">
        <div class="lang-switch">
          <button class="lang-btn active" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="bn">বাং</button>
        </div>
        <div class="user-avatar" id="userAvatar">
          <img id="userPhoto" alt="User" width="32" height="32">
        </div>
        <button class="editor-logout" id="logoutBtn" title="Sign out">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </header>

    <!-- Editor Toolbar -->
    <div class="editor-toolbar">
      <div class="toolbar-group">
        <button class="toolbar-btn" id="btnNewStory" title="New story">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span class="toolbar-label" data-en="New" data-bn="নতুন">New</span>
        </button>
        <button class="toolbar-btn" id="btnMyStories" title="My stories">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span class="toolbar-label" data-en="Stories" data-bn="গল্প">Stories</span>
        </button>
      </div>
      <div class="toolbar-group">
        <button class="toolbar-btn ai-btn" id="btnAiWrite" title="AI Write">
          <span class="ai-icon">✨</span>
          <span class="toolbar-label" data-en="AI Write" data-bn="AI লেখা">AI Write</span>
        </button>
        <button class="toolbar-btn ai-btn" id="btnAiEdit" title="AI Edit">
          <span class="ai-icon">🪄</span>
          <span class="toolbar-label" data-en="AI Edit" data-bn="AI সম্পাদনা">AI Edit</span>
        </button>
        <button class="toolbar-btn ai-btn" id="btnAiTranslate" title="Translate">
          <span class="ai-icon">🌐</span>
          <span class="toolbar-label" data-en="Translate" data-bn="অনুবাদ">Translate</span>
        </button>
        <button class="toolbar-btn ai-btn" id="btnAiSuggest" title="Suggest next">
          <span class="ai-icon">💡</span>
          <span class="toolbar-label" data-en="Suggest" data-bn="পরামর্শ">Suggest</span>
        </button>
      </div>
    </div>

    <!-- Story Metadata -->
    <div class="story-meta-editor">
      <input type="text" class="story-title-input" id="storyTitle" data-placeholder-en="Story title..." data-placeholder-bn="গল্পের শিরোনাম..." placeholder="Story title...">
      <div class="meta-row">
        <input type="text" class="story-author-input" id="storyAuthor" data-placeholder-en="Author name" data-placeholder-bn="লেখকের নাম" placeholder="Author name">
        <select class="story-topic-select" id="storyTopic">
          <option value="ghosts" data-en="Ghosts" data-bn="ভূত">Ghosts</option>
          <option value="crime" data-en="Crime Thriller" data-bn="অপরাধ থ্রিলার">Crime Thriller</option>
          <option value="haunted" data-en="Haunted Places" data-bn="ভুতুড়ে জায়গা">Haunted Places</option>
          <option value="survival" data-en="Survival" data-bn="বেঁচে থাকা">Survival</option>
          <option value="mystery" data-en="Mystery" data-bn="রহস্য">Mystery</option>
          <option value="paranormal" data-en="Paranormal" data-bn="অলৌকিক">Paranormal</option>
          <option value="folklore" data-en="Dark Folklore" data-bn="অন্ধকার লোককথা">Dark Folklore</option>
          <option value="psychological" data-en="Psychological" data-bn="মনস্তাত্ত্বিক">Psychological</option>
        </select>
      </div>
      <button class="title-suggest-btn" id="btnSuggestTitle" data-en="✨ Suggest titles" data-bn="✨ শিরোনাম পরামর্শ">✨ Suggest titles</button>
    </div>

    <!-- Main Editor Area -->
    <div class="editor-body">
      <textarea class="editor-textarea" id="editorText" data-placeholder-en="Start writing your story here... or use AI Write to generate a draft from a prompt." data-placeholder-bn="এখানে আপনার গল্প লিখুন... অথবা একটি খসড়া তৈরি করতে AI লেখা ব্যবহার করুন।" placeholder="Start writing your story here... or use AI Write to generate a draft from a prompt."></textarea>
    </div>

    <!-- AI Output Panel (slides up) -->
    <div class="ai-panel" id="aiPanel">
      <div class="ai-panel-header">
        <span class="ai-panel-title" id="aiPanelTitle">AI Output</span>
        <div class="ai-panel-actions">
          <button class="ai-panel-btn" id="btnInsertAi" data-en="Insert" data-bn="যোগ করুন">Insert</button>
          <button class="ai-panel-btn" id="btnReplaceAi" data-en="Replace" data-bn="প্রতিস্থাপন">Replace</button>
          <button class="ai-panel-btn secondary" id="btnCloseAi" data-en="Close" data-bn="বন্ধ">Close</button>
        </div>
      </div>
      <div class="ai-panel-content" id="aiPanelContent">
        <div class="ai-loading" id="aiLoading">
          <div class="ai-spinner"></div>
          <span data-en="Thinking..." data-bn="ভাবছে...">Thinking...</span>
        </div>
        <div class="ai-result" id="aiResult"></div>
      </div>
    </div>

    <!-- Bottom Actions -->
    <div class="editor-bottom">
      <div class="word-count" id="wordCount" data-en-template="{count} words" data-bn-template="{count} শব্দ">0 words</div>
      <div class="editor-bottom-actions">
        <button class="save-draft-btn" id="btnSaveDraft">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          <span data-en="Save Draft" data-bn="খসড়া সংরক্ষণ">Save Draft</span>
        </button>
        <button class="publish-btn" id="btnPublish">
          <span data-en="Publish" data-bn="প্রকাশ করুন">Publish</span>
        </button>
      </div>
    </div>

    <!-- Stories List Modal -->
    <div class="stories-modal" id="storiesModal">
      <div class="stories-modal-backdrop" id="storiesModalBackdrop"></div>
      <div class="stories-modal-content">
        <h3 class="stories-modal-title" data-en="My Stories" data-bn="আমার গল্প">My Stories</h3>
        <div class="stories-list" id="storiesList"></div>
        <button class="stories-modal-close" id="storiesModalClose" data-en="Close" data-bn="বন্ধ">Close</button>
      </div>
    </div>

    <!-- AI Prompt Modal -->
    <div class="ai-prompt-modal" id="aiPromptModal">
      <div class="ai-prompt-backdrop" id="aiPromptBackdrop"></div>
      <div class="ai-prompt-content">
        <h3 class="ai-prompt-title" id="aiPromptTitle">AI Write</h3>
        <textarea class="ai-prompt-input" id="aiPromptInput" rows="3" data-placeholder-en="Describe what you want to write about..." data-placeholder-bn="আপনি কী নিয়ে লিখতে চান তা বর্ণনা করুন..."></textarea>
        <div class="ai-prompt-actions">
          <button class="ai-prompt-btn secondary" id="aiPromptCancel" data-en="Cancel" data-bn="বাতিল">Cancel</button>
          <button class="ai-prompt-btn primary" id="aiPromptSubmit" data-en="Generate" data-bn="তৈরি করুন">Generate</button>
        </div>
      </div>
    </div>

  </div>

  <script src="editor.js"></script>
</body>
</html>
