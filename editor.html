<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katha 芒聙聰 Editor</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="editor.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Noto+Sans+Bengali:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h1 class="login-logo">脿娄聲脿娄楼脿娄戮 <span>Katha</span></h1>
      <p class="login-subtitle">Editor Access</p>
      <div class="login-divider"></div>
      <p class="login-instruction">Sign in with your authorized Google account</p>
      <div id="googleSignInBtn"></div>
      <p class="login-error" id="loginError"></p>
    </div>
  </div>

  <!-- Editor (hidden until authenticated) -->
  <div class="editor-app" id="editorApp" style="display:none;">

    <!-- Simple Header -->
    <header class="editor-header">
      <h1 class="editor-logo">脿娄聲脿娄楼脿娄戮 <span>Editor</span></h1>
      <div class="editor-header-right">
        <div class="lang-switch">
          <button class="lang-btn active" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="bn">脿娄卢脿娄戮脿娄聜</button>
        </div>
        <button class="editor-logout" id="logoutBtn" data-en="Sign Out" data-bn="脿娄赂脿娄戮脿娄聡脿娄篓 脿娄聠脿娄聣脿娄聼">Sign Out</button>
      </div>
    </header>

    <!-- Story Title -->
    <div class="title-section">
      <input type="text" class="story-title-input" id="storyTitle"
        data-placeholder-en="Enter story title..."
        data-placeholder-bn="脿娄聴脿娄虏脿搂聧脿娄陋脿搂聡脿娄掳 脿娄露脿娄驴脿娄掳脿搂聥脿娄篓脿娄戮脿娄庐 脿娄虏脿娄驴脿娄聳脿搂聛脿娄篓..."
        placeholder="Enter story title...">
      <select class="story-topic-select" id="storyTopic">
        <option value="ghosts" data-en="Ghosts" data-bn="脿娄颅脿搂聜脿娄陇">Ghosts</option>
        <option value="crime" data-en="Crime Thriller" data-bn="脿娄聟脿娄陋脿娄掳脿娄戮脿娄搂 脿娄楼脿搂聧脿娄掳脿娄驴脿娄虏脿娄戮脿娄掳">Crime Thriller</option>
        <option value="haunted" data-en="Haunted Places" data-bn="脿娄颅脿搂聛脿娄陇脿搂聛脿娄隆脿娄录脿搂聡 脿娄聹脿娄戮脿娄炉脿娄录脿娄聴脿娄戮">Haunted Places</option>
        <option value="survival" data-en="Survival" data-bn="脿娄卢脿搂聡脿娄聛脿娄職脿搂聡 脿娄楼脿娄戮脿娄聲脿娄戮">Survival</option>
        <option value="mystery" data-en="Mystery" data-bn="脿娄掳脿娄鹿脿娄赂脿搂聧脿娄炉">Mystery</option>
        <option value="paranormal" data-en="Paranormal" data-bn="脿娄聟脿娄虏脿搂聦脿娄聲脿娄驴脿娄聲">Paranormal</option>
        <option value="folklore" data-en="Dark Folklore" data-bn="脿娄聟脿娄篓脿搂聧脿娄搂脿娄聲脿娄戮脿娄掳 脿娄虏脿搂聥脿娄聲脿娄聲脿娄楼脿娄戮">Dark Folklore</option>
        <option value="psychological" data-en="Psychological" data-bn="脿娄庐脿娄篓脿娄赂脿搂聧脿娄陇脿娄戮脿娄陇脿搂聧脿娄陇脿搂聧脿娄卢脿娄驴脿娄聲">Psychological</option>
      </select>
    </div>

    <!-- Main Writing Area -->
    <div class="editor-body">
      <textarea class="editor-textarea" id="editorText"
        data-placeholder-en="Start writing your story here..."
        data-placeholder-bn="脿娄聫脿娄聳脿娄戮脿娄篓脿搂聡 脿娄聠脿娄陋脿娄篓脿娄戮脿娄掳 脿娄聴脿娄虏脿搂聧脿娄陋 脿娄虏脿娄驴脿娄聳脿搂聛脿娄篓..."
        placeholder="Start writing your story here..."></textarea>
    </div>

    <!-- AI Tools 芒聙聰 big, clear buttons -->
    <div class="ai-tools">
      <p class="ai-tools-label" data-en="AI Tools" data-bn="AI 脿娄赂脿娄掳脿娄聻脿搂聧脿娄聹脿娄戮脿娄庐">AI Tools</p>
      <div class="ai-tools-grid">
        <button class="ai-tool-btn" id="btnAiWrite" data-en="芒聹篓 Write for Me" data-bn="芒聹篓 脿娄聠脿娄庐脿娄戮脿娄掳 脿娄聹脿娄篓脿搂聧脿娄炉 脿娄虏脿娄驴脿娄聳脿搂聛脿娄篓">芒聹篓 Write for Me</button>
        <button class="ai-tool-btn" id="btnAiEdit" data-en="冒聼陋聞 Improve My Text" data-bn="冒聼陋聞 脿娄聠脿娄庐脿娄戮脿娄掳 脿娄虏脿搂聡脿娄聳脿娄戮 脿娄聣脿娄篓脿搂聧脿娄篓脿娄陇 脿娄聲脿娄掳脿搂聛脿娄篓">冒聼陋聞 Improve My Text</button>
        <button class="ai-tool-btn" id="btnAiTranslate" data-en="冒聼聦聬 Translate" data-bn="冒聼聦聬 脿娄聟脿娄篓脿搂聛脿娄卢脿娄戮脿娄娄 脿娄聲脿娄掳脿搂聛脿娄篓">冒聼聦聬 Translate</button>
        <button class="ai-tool-btn" id="btnAiSuggest" data-en="冒聼聮隆 What Happens Next?" data-bn="冒聼聮隆 脿娄陋脿娄掳脿娄卢脿娄掳脿搂聧脿娄陇脿搂聙脿娄陇脿搂聡 脿娄聲脿搂聙 脿娄鹿脿娄卢脿搂聡?">冒聼聮隆 What Happens Next?</button>
      </div>
    </div>

    <!-- Action Buttons 芒聙聰 big and clear -->
    <div class="action-buttons">
      <button class="action-btn stories-btn" id="btnMyStories" data-en="冒聼聯聜 My Stories" data-bn="冒聼聯聜 脿娄聠脿娄庐脿娄戮脿娄掳 脿娄聴脿娄虏脿搂聧脿娄陋">冒聼聯聜 My Stories</button>
      <button class="action-btn new-btn" id="btnNewStory" data-en="冒聼聯聺 New Story" data-bn="冒聼聯聺 脿娄篓脿娄陇脿搂聛脿娄篓 脿娄聴脿娄虏脿搂聧脿娄陋">冒聼聯聺 New Story</button>
      <button class="action-btn save-btn" id="btnSaveDraft" data-en="冒聼聮戮 Save Draft" data-bn="冒聼聮戮 脿娄聳脿娄赂脿娄隆脿娄录脿娄戮 脿娄赂脿娄聜脿娄掳脿娄聲脿搂聧脿娄路脿娄拢">冒聼聮戮 Save Draft</button>
      <button class="action-btn publish-btn" id="btnPublish" data-en="冒聼職聙 Publish" data-bn="冒聼職聙 脿娄陋脿搂聧脿娄掳脿娄聲脿娄戮脿娄露 脿娄聲脿娄掳脿搂聛脿娄篓">冒聼職聙 Publish</button>
    </div>

    <!-- AI Output Panel (slides up) -->
    <div class="ai-panel" id="aiPanel">
      <div class="ai-panel-header">
        <span class="ai-panel-title" id="aiPanelTitle">AI Output</span>
        <button class="ai-panel-close" id="btnCloseAi">芒聹聲</button>
      </div>
      <div class="ai-panel-content" id="aiPanelContent">
        <div class="ai-loading" id="aiLoading">
          <div class="ai-spinner"></div>
          <span data-en="Thinking..." data-bn="脿娄颅脿娄戮脿娄卢脿娄聸脿搂聡...">Thinking...</span>
        </div>
        <div class="ai-result" id="aiResult"></div>
      </div>
      <div class="ai-panel-actions">
        <button class="ai-action-btn insert-btn" id="btnInsertAi" data-en="芒聹聟 Add to My Story" data-bn="芒聹聟 脿娄聠脿娄庐脿娄戮脿娄掳 脿娄聴脿娄虏脿搂聧脿娄陋脿搂聡 脿娄炉脿搂聥脿娄聴 脿娄聲脿娄掳脿搂聛脿娄篓">芒聹聟 Add to My Story</button>
        <button class="ai-action-btn replace-btn" id="btnReplaceAi" data-en="冒聼聰聞 Replace My Text" data-bn="冒聼聰聞 脿娄聠脿娄庐脿娄戮脿娄掳 脿娄虏脿搂聡脿娄聳脿娄戮 脿娄卢脿娄娄脿娄虏脿娄戮脿娄篓">冒聼聰聞 Replace My Text</button>
      </div>
    </div>

    <!-- Stories List Modal -->
    <div class="stories-modal" id="storiesModal">
      <div class="stories-modal-backdrop" id="storiesModalBackdrop"></div>
      <div class="stories-modal-content">
        <h3 class="stories-modal-title" data-en="My Stories" data-bn="脿娄聠脿娄庐脿娄戮脿娄掳 脿娄聴脿娄虏脿搂聧脿娄陋">My Stories</h3>
        <div class="stories-list" id="storiesList"></div>
        <button class="stories-modal-close" id="storiesModalClose" data-en="Close" data-bn="脿娄卢脿娄篓脿搂聧脿娄搂 脿娄聲脿娄掳脿搂聛脿娄篓">Close</button>
      </div>
    </div>

    <!-- AI Prompt Modal (for "Write for Me") -->
    <div class="ai-prompt-modal" id="aiPromptModal">
      <div class="ai-prompt-backdrop" id="aiPromptBackdrop"></div>
      <div class="ai-prompt-content">
        <h3 class="ai-prompt-title" id="aiPromptTitle" data-en="What should I write about?" data-bn="脿娄聠脿娄庐脿娄驴 脿娄聲脿搂聙 脿娄篓脿娄驴脿娄炉脿娄录脿搂聡 脿娄虏脿娄驴脿娄聳脿娄卢?">What should I write about?</h3>
        <textarea class="ai-prompt-input" id="aiPromptInput" rows="4"
          data-placeholder-en="Example: A ghost story set in an old house in Kolkata during monsoon..."
          data-placeholder-bn="脿娄聣脿娄娄脿娄戮脿娄鹿脿娄掳脿娄拢: 脿娄聲脿娄虏脿娄聲脿娄戮脿娄陇脿娄戮脿娄炉脿娄录 脿娄卢脿娄掳脿搂聧脿娄路脿娄戮脿娄聲脿娄戮脿娄虏脿搂聡 脿娄聫脿娄聲脿娄聼脿娄驴 脿娄陋脿搂聛脿娄掳脿娄篓脿搂聥 脿娄卢脿娄戮脿娄隆脿娄录脿娄驴脿娄陇脿搂聡 脿娄颅脿搂聜脿娄陇脿搂聡脿娄掳 脿娄聴脿娄虏脿搂聧脿娄陋..."
          placeholder="Example: A ghost story set in an old house in Kolkata during monsoon..."></textarea>
        <div class="ai-prompt-actions">
          <button class="ai-prompt-btn cancel" id="aiPromptCancel" data-en="Cancel" data-bn="脿娄卢脿娄戮脿娄陇脿娄驴脿娄虏">Cancel</button>
          <button class="ai-prompt-btn go" id="aiPromptSubmit" data-en="芒聹篓 Write It!" data-bn="芒聹篓 脿娄虏脿娄驴脿娄聳脿搂聛脿娄篓!">芒聹篓 Write It!</button>
        </div>
      </div>
    </div>

  </div>

  <script src="editor.js"></script>
</body>
</html>
