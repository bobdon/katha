<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katha — Editor</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="editor.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Noto+Sans+Bengali:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h1 class="login-logo">কথা <span>Katha</span></h1>
      <p class="login-subtitle">Editor Access</p>
      <div class="login-divider"></div>
      <p class="login-instruction">Sign in with your authorized Google account</p>
      <div id="googleSignInBtn"></div>
      <p class="login-error" id="loginError"></p>
    </div>
  </div>

  <!-- Editor (hidden until authenticated) -->
  <div class="editor-app" id="editorApp" style="display:none;">

    <!-- Simple Header -->
    <header class="editor-header">
      <h1 class="editor-logo">কথা <span>Editor</span></h1>
      <div class="editor-header-right">
        <div class="lang-switch">
          <button class="lang-btn active" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="bn">বাং</button>
        </div>
        <button class="editor-logout" id="logoutBtn" data-en="Sign Out" data-bn="সাইন আউট">Sign Out</button>
      </div>
    </header>

    <!-- Story Title -->
    <div class="title-section">
      <input type="text" class="story-title-input" id="storyTitle"
        data-placeholder-en="Enter story title..."
        data-placeholder-bn="গল্পের শিরোনাম লিখুন..."
        placeholder="Enter story title...">
      <select class="story-topic-select" id="storyTopic">
        <option value="ghosts" data-en="Ghosts" data-bn="ভূত">Ghosts</option>
        <option value="crime" data-en="Crime Thriller" data-bn="অপরাধ থ্রিলার">Crime Thriller</option>
        <option value="haunted" data-en="Haunted Places" data-bn="ভুতুড়ে জায়গা">Haunted Places</option>
        <option value="survival" data-en="Survival" data-bn="বেঁচে থাকা">Survival</option>
        <option value="mystery" data-en="Mystery" data-bn="রহস্য">Mystery</option>
        <option value="paranormal" data-en="Paranormal" data-bn="অলৌকিক">Paranormal</option>
        <option value="folklore" data-en="Dark Folklore" data-bn="অন্ধকার লোককথা">Dark Folklore</option>
        <option value="psychological" data-en="Psychological" data-bn="মনস্তাত্ত্বিক">Psychological</option>
      </select>
    </div>

    <!-- Main Writing Area -->
    <div class="editor-body">
      <textarea class="editor-textarea" id="editorText"
        data-placeholder-en="Start writing your story here..."
        data-placeholder-bn="এখানে আপনার গল্প লিখুন..."
        placeholder="Start writing your story here..."></textarea>
    </div>

    <!-- AI Tools — big, clear buttons -->
    <div class="ai-tools">
      <p class="ai-tools-label" data-en="AI Tools" data-bn="AI সরঞ্জাম">AI Tools</p>
      <div class="ai-tools-grid">
        <button class="ai-tool-btn" id="btnAiWrite" data-en="✨ Write for Me" data-bn="✨ আমার জন্য লিখুন">✨ Write for Me</button>
        <button class="ai-tool-btn" id="btnAiEdit" data-en="🪄 Improve My Text" data-bn="🪄 আমার লেখা উন্নত করুন">🪄 Improve My Text</button>
        <button class="ai-tool-btn" id="btnAiTranslate" data-en="🌐 Translate" data-bn="🌐 অনুবাদ করুন">🌐 Translate</button>
        <button class="ai-tool-btn" id="btnAiSuggest" data-en="💡 What Happens Next?" data-bn="💡 পরবর্তীতে কী হবে?">💡 What Happens Next?</button>
      </div>
    </div>

    <!-- Action Buttons — big and clear -->
    <div class="action-buttons">
      <button class="action-btn stories-btn" id="btnMyStories" data-en="📂 My Stories" data-bn="📂 আমার গল্প">📂 My Stories</button>
      <button class="action-btn new-btn" id="btnNewStory" data-en="📝 New Story" data-bn="📝 নতুন গল্প">📝 New Story</button>
      <button class="action-btn save-btn" id="btnSaveDraft" data-en="💾 Save Draft" data-bn="💾 খসড়া সংরক্ষণ">💾 Save Draft</button>
      <button class="action-btn publish-btn" id="btnPublish" data-en="🚀 Publish" data-bn="🚀 প্রকাশ করুন">🚀 Publish</button>
    </div>

    <!-- AI Output Panel (slides up) -->
    <div class="ai-panel" id="aiPanel">
      <div class="ai-panel-header">
        <span class="ai-panel-title" id="aiPanelTitle">AI Output</span>
        <button class="ai-panel-close" id="btnCloseAi">✕</button>
      </div>
      <div class="ai-panel-content" id="aiPanelContent">
        <div class="ai-loading" id="aiLoading">
          <div class="ai-spinner"></div>
          <span data-en="Thinking..." data-bn="ভাবছে...">Thinking...</span>
        </div>
        <div class="ai-result" id="aiResult"></div>
      </div>
      <div class="ai-panel-actions">
        <button class="ai-action-btn insert-btn" id="btnInsertAi" data-en="✅ Add to My Story" data-bn="✅ আমার গল্পে যোগ করুন">✅ Add to My Story</button>
        <button class="ai-action-btn replace-btn" id="btnReplaceAi" data-en="🔄 Replace My Text" data-bn="🔄 আমার লেখা বদলান">🔄 Replace My Text</button>
      </div>
    </div>

    <!-- Stories List Modal -->
    <div class="stories-modal" id="storiesModal">
      <div class="stories-modal-backdrop" id="storiesModalBackdrop"></div>
      <div class="stories-modal-content">
        <h3 class="stories-modal-title" data-en="My Stories" data-bn="আমার গল্প">My Stories</h3>
        <div class="stories-list" id="storiesList"></div>
        <button class="stories-modal-close" id="storiesModalClose" data-en="Close" data-bn="বন্ধ করুন">Close</button>
      </div>
    </div>

    <!-- AI Prompt Modal (for "Write for Me") -->
    <div class="ai-prompt-modal" id="aiPromptModal">
      <div class="ai-prompt-backdrop" id="aiPromptBackdrop"></div>
      <div class="ai-prompt-content">
        <h3 class="ai-prompt-title" id="aiPromptTitle" data-en="What should I write about?" data-bn="আমি কী নিয়ে লিখব?">What should I write about?</h3>
        <textarea class="ai-prompt-input" id="aiPromptInput" rows="4"
          data-placeholder-en="Example: A ghost story set in an old house in Kolkata during monsoon..."
          data-placeholder-bn="উদাহরণ: কলকাতায় বর্ষাকালে একটি পুরনো বাড়িতে ভূতের গল্প..."
          placeholder="Example: A ghost story set in an old house in Kolkata during monsoon..."></textarea>
        <div class="ai-prompt-actions">
          <button class="ai-prompt-btn cancel" id="aiPromptCancel" data-en="Cancel" data-bn="বাতিল">Cancel</button>
          <button class="ai-prompt-btn go" id="aiPromptSubmit" data-en="✨ Write It!" data-bn="✨ লিখুন!">✨ Write It!</button>
        </div>
      </div>
    </div>

  </div>

  <script src="editor.js"></script>
</body>
</html>
